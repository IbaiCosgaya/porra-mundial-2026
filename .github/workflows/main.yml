name: Actualizar Clasificacion Porra

on:
  schedule:
    # Se ejecuta automáticamente cada 30 minutos
    - cron: '*/30 * * * *'
  workflow_dispatch: # Activa el botón para ejecutarlo a mano cuando quieras

jobs:
  build:
    runs-on: ubuntu-latest
    
    # 🌟 PASAMOS DE COMBATIR EL WARNING A SILENCIARLO POR COMPLETO
    env:
      ACTIONS_FLAGS: '--no-warnings'
      ACTIONS_STEP_DEBUG: 'false'

    steps:
    # 🤫 Este paso intermedio le dice a la máquina de GitHub que ignore los avisos de Node.js antiguos
    - name: Silenciar avisos de Node
      run: echo "ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION=true" >> $GITHUB_ENV

    - name: Clonar el repositorio
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.PORRA_TOKEN }}

    - name: Configurar Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Instalar dependencias limpias
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Ejecutar script de puntuacion
      env:
        GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
      run: python procesar_puntos.py

    - name: Guardar cambios del JSON en el repositorio
      run: |
        git config --global user.name 'IbaiCosgaya'
        git config --global user.email 'porrabot@github.com'
        git add clasificacion.json
        git diff --quiet && git diff --staged --quiet || (git commit -m "🤖 Clasificación actualizada automáticamente" && git push)

name: Actualizar Clasificacion Porra

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    env:
      ACTIONS_FLAGS: '--no-warnings'
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true' # 🌟 Evita que falle a partir del 16 de junio

    steps:
    - name: Clonar el repositorio
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.PORRA_TOKEN }}

    - name: Configurar Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Instalar dependencias
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Ejecutar script de puntuacion
      env:
        GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
        WHATSAPP_PHONE: ${{ secrets.WHATSAPP_PHONE }}       # 🌟 Activado
        WHATSAPP_API_KEY: ${{ secrets.WHATSAPP_API_KEY }}   # 🌟 Activado
      run: python procesar_puntos.py

    - name: Guardar cambios en el repositorio público
      run: |
        git config --global user.name 'PorraBot'
        git config --global user.email 'porrabot@github.com'
        git add clasificacion.json
        git diff --quiet && git diff --staged --quiet || (git commit -m "🤖 Clasificación actualizada automáticamente" && git push)
